name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*' # Trigger strictly on version tags

jobs:
  build-and-release:
    name: Build on ${{ matrix.os_label }}
    runs-on: ${{ matrix.os }}
    
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os_label: Windows-x64
            ext: zip
          - os: ubuntu-22.04 # Updated to a fully supported runner
            os_label: Linux-x64
            ext: tar.gz
          - os: macos-latest
            os_label: macOS-x64
            ext: zip

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linux GUI Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Execute Build Script
        run: python build.py

      - name: Package Windows / macOS (ZIP)
        if: runner.os == 'Windows' || runner.os == 'macOS'
        run: |
          cd dist
          # Compress using the exact version tag triggered by the user
          Compress-Archive -Path ArchiveOrgDownloader -DestinationPath ../ArchiveOrgDownloader-${{ github.ref_name }}-${{ matrix.os_label }}.zip
        shell: pwsh

      - name: Package Linux (TAR.GZ)
        if: runner.os == 'Linux'
        run: |
          cd dist
          # Compress the directory while preserving executable permissions
          tar -czvf ../ArchiveOrgDownloader-${{ github.ref_name }}-${{ matrix.os_label }}.tar.gz ArchiveOrgDownloader/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ArchiveOrgDownloader-${{ github.ref_name }}-${{ matrix.os_label }}.${{ matrix.ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}